{% extends "base.html" %}

{% block content %}
<div class="generator-container">
    <div class="controls">
        <label for="digit">请输入数字 (0-9):</label>
        <input type="number" id="digit" min="0" max="9" required>
        
        <label for="model-select">选择模型:</label>
        <select id="model-select">
            <option value="">加载中...</option>
        </select>

        <label for="guidance-scale">引导强度:</label>
        <input type="range" id="guidance-scale" min="0" max="5" step="0.1" value="2.0">
        <span id="guidance-value">2.0</span>
        
        <label for="steps">采样步数:</label>
        <input type="range" id="steps" min="50" max="400" step="10" value="200">
        <span id="steps-value">200</span>
        
        <button id="generate-btn">生成</button>
    </div>
    <div class="result-container">
        <h2>生成结果:</h2>
        <div id="result-image"></div>
    </div>
</div>
{% endblock %}
